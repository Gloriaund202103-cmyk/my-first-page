<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快递单量智能预测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0a1628;
            --primary-blue: #1a2f4f;
            --accent-cyan: #00d4ff;
            --accent-blue: #0088ff;
            --text-primary: #e8f1ff;
            --text-secondary: #8fa7c8;
            --card-bg: rgba(26, 47, 79, 0.6);
            --border-color: rgba(0, 212, 255, 0.2);
            --success: #00ff88;
            --warning: #ffa600;
            --error: #ff3366;
        }

        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
            background: var(--primary-dark);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 科技网格背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* 流光效果 */
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* 标题区域 */
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }

        /* 卡片样式 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        .card:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title::before {
            content: '▸';
            color: var(--accent-blue);
            font-size: 1.5rem;
        }

        /* 输入区域 */
        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
        }

        input, textarea, select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(10, 22, 40, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
            font-family: 'SF Mono', monospace;
        }

        /* 参数调节器 */
        .params-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .param-control {
            background: rgba(10, 22, 40, 0.5);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }

        .param-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .param-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .param-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-cyan);
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: rgba(0, 212, 255, 0.1);
            border: none;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent-cyan);
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--accent-cyan);
            cursor: pointer;
            border-radius: 50%;
            border: none;
        }

        /* 按钮 */
        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            color: white;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: rgba(138, 167, 200, 0.2);
            border: 1px solid var(--border-color);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-card {
            background: rgba(10, 22, 40, 0.8);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--accent-cyan);
            transform: scale(1.05);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-cyan);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .stat-unit {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-left: 0.3rem;
        }

        /* 表格 */
        .table-container {
            overflow-x: auto;
            margin-top: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        thead {
            background: rgba(0, 212, 255, 0.1);
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-cyan);
            border-bottom: 2px solid var(--accent-cyan);
        }

        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .predicted-row {
            background: rgba(0, 136, 255, 0.05);
        }

        .weekend {
            color: var(--warning);
        }

        /* 图表容器 */
        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 1rem;
        }

        /* 标签 */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-success {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success);
        }

        .badge-warning {
            background: rgba(255, 166, 0, 0.2);
            color: var(--warning);
        }

        .badge-info {
            background: rgba(0, 212, 255, 0.2);
            color: var(--accent-cyan);
        }

        /* 提示信息 */
        .hint {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-style: italic;
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 1rem;
            border: 4px solid rgba(0, 212, 255, 0.1);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .card {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .params-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .chart-container {
                height: 300px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            th, td {
                padding: 0.6rem 0.5rem;
                font-size: 0.75rem;
            }
        }

        /* 隐藏类 */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>快递单量智能预测系统</h1>
            <p class="subtitle">Delivery Forecast Intelligence</p>
        </header>

        <!-- 数据输入卡片 -->
        <div class="card">
            <h2 class="card-title">历史数据输入</h2>
            <div class="input-group">
                <label for="historyData">每日订单量（每行一个数字，或逗号分隔）</label>
                <textarea id="historyData" placeholder="示例：
1500
1620
1450
...

或：1500, 1620, 1450, 1380, 1890, 2100, 1950"></textarea>
                <p class="hint">提示：建议输入至少14天的历史数据以获得更准确的预测</p>
            </div>

            <div class="input-group">
                <label for="startDate">历史数据起始日期</label>
                <input type="date" id="startDate" value="">
            </div>
        </div>

        <!-- 预测设置卡片 -->
        <div class="card">
            <h2 class="card-title">预测参数设置</h2>

            <div class="input-group">
                <label for="forecastDays">预测天数</label>
                <select id="forecastDays">
                    <option value="7">7天</option>
                    <option value="15">15天</option>
                    <option value="30" selected>30天</option>
                </select>
            </div>

            <div class="params-grid">
                <div class="param-control">
                    <div class="param-header">
                        <span class="param-label">季节系数</span>
                        <span class="param-value" id="seasonValue">1.0</span>
                    </div>
                    <input type="range" id="seasonFactor" min="0.5" max="2" step="0.1" value="1">
                    <p class="hint">影响整体单量的季节性波动</p>
                </div>

                <div class="param-control">
                    <div class="param-header">
                        <span class="param-label">促销系数</span>
                        <span class="param-value" id="promoValue">1.0</span>
                    </div>
                    <input type="range" id="promoFactor" min="1" max="3" step="0.1" value="1">
                    <p class="hint">大促期间的单量增长倍数</p>
                </div>

                <div class="param-control">
                    <div class="param-header">
                        <span class="param-label">周末系数</span>
                        <span class="param-value" id="weekendValue">0.8</span>
                    </div>
                    <input type="range" id="weekendFactor" min="0.3" max="1.5" step="0.05" value="0.8">
                    <p class="hint">周末相对工作日的单量比例</p>
                </div>
            </div>

            <div class="button-group" style="margin-top: 2rem;">
                <button id="predictBtn">生成预测</button>
                <button id="clearBtn" class="secondary">清除数据</button>
            </div>
        </div>

        <!-- 加载动画 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在分析数据并生成预测...</p>
        </div>

        <!-- 统计结果卡片 -->
        <div class="card hidden" id="statsCard">
            <h2 class="card-title">预测统计概览</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">历史日均</div>
                    <div class="stat-value" id="histAvg">0<span class="stat-unit">件</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">预测日均</div>
                    <div class="stat-value" id="forecastAvg">0<span class="stat-unit">件</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">预测峰值</div>
                    <div class="stat-value" id="forecastMax">0<span class="stat-unit">件</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">预测总量</div>
                    <div class="stat-value" id="forecastTotal">0<span class="stat-unit">件</span></div>
                </div>
            </div>
        </div>

        <!-- 图表卡片 -->
        <div class="card hidden" id="chartCard">
            <h2 class="card-title">趋势分析图表</h2>
            <div class="chart-container">
                <canvas id="forecastChart"></canvas>
            </div>
        </div>

        <!-- 结果表格卡片 -->
        <div class="card hidden" id="tableCard">
            <h2 class="card-title">预测明细数据</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>星期</th>
                            <th>预测单量</th>
                            <th>类型</th>
                            <th>置信度</th>
                        </tr>
                    </thead>
                    <tbody id="resultTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 初始化
        let forecastChart = null;

        // 设置默认日期
        const today = new Date();
        const twoWeeksAgo = new Date(today);
        twoWeeksAgo.setDate(today.getDate() - 14);
        document.getElementById('startDate').value = twoWeeksAgo.toISOString().split('T')[0];

        // 参数滑块更新
        document.getElementById('seasonFactor').addEventListener('input', (e) => {
            document.getElementById('seasonValue').textContent = parseFloat(e.target.value).toFixed(1);
        });

        document.getElementById('promoFactor').addEventListener('input', (e) => {
            document.getElementById('promoValue').textContent = parseFloat(e.target.value).toFixed(1);
        });

        document.getElementById('weekendFactor').addEventListener('input', (e) => {
            document.getElementById('weekendValue').textContent = parseFloat(e.target.value).toFixed(2);
        });

        // 预测按钮
        document.getElementById('predictBtn').addEventListener('click', generateForecast);

        // 清除按钮
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('historyData').value = '';
            document.getElementById('statsCard').classList.add('hidden');
            document.getElementById('chartCard').classList.add('hidden');
            document.getElementById('tableCard').classList.add('hidden');
        });

        // 核心预测函数
        function generateForecast() {
            // 获取输入数据
            const historyText = document.getElementById('historyData').value.trim();
            if (!historyText) {
                alert('请输入历史数据！');
                return;
            }

            // 解析历史数据
            const historyData = parseHistoryData(historyText);
            if (historyData.length < 7) {
                alert('历史数据至少需要7天！');
                return;
            }

            // 获取参数
            const forecastDays = parseInt(document.getElementById('forecastDays').value);
            const seasonFactor = parseFloat(document.getElementById('seasonFactor').value);
            const promoFactor = parseFloat(document.getElementById('promoFactor').value);
            const weekendFactor = parseFloat(document.getElementById('weekendFactor').value);
            const startDate = new Date(document.getElementById('startDate').value);

            // 显示加载动画
            document.getElementById('loading').classList.add('active');
            document.getElementById('statsCard').classList.add('hidden');
            document.getElementById('chartCard').classList.add('hidden');
            document.getElementById('tableCard').classList.add('hidden');

            // 模拟异步处理
            setTimeout(() => {
                // 执行预测
                const forecast = performForecast(historyData, forecastDays, startDate, {
                    seasonFactor,
                    promoFactor,
                    weekendFactor
                });

                // 显示结果
                displayResults(forecast, historyData);

                // 隐藏加载动画
                document.getElementById('loading').classList.remove('active');
            }, 800);
        }

        // 解析历史数据
        function parseHistoryData(text) {
            const values = text
                .replace(/\n/g, ',')
                .split(',')
                .map(v => parseFloat(v.trim()))
                .filter(v => !isNaN(v) && v >= 0);
            return values;
        }

        // 执行预测算法
        function performForecast(historyData, forecastDays, startDate, params) {
            const { seasonFactor, promoFactor, weekendFactor } = params;

            // 计算历史统计
            const histAvg = average(historyData);
            const trend = calculateTrend(historyData);

            // 分离工作日和周末数据
            const weekdayData = [];
            const weekendData = [];

            historyData.forEach((value, index) => {
                const date = new Date(startDate);
                date.setDate(date.getDate() + index);
                const dayOfWeek = date.getDay();

                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    weekendData.push(value);
                } else {
                    weekdayData.push(value);
                }
            });

            const weekdayAvg = weekdayData.length > 0 ? average(weekdayData) : histAvg;
            const weekendAvg = weekendData.length > 0 ? average(weekendData) : histAvg * weekendFactor;

            // 生成预测
            const forecast = [];
            const lastHistDate = new Date(startDate);
            lastHistDate.setDate(lastHistDate.getDate() + historyData.length);

            for (let i = 0; i < forecastDays; i++) {
                const forecastDate = new Date(lastHistDate);
                forecastDate.setDate(forecastDate.getDate() + i);
                const dayOfWeek = forecastDate.getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

                // 基础预测值
                let baseValue = isWeekend ? weekendAvg : weekdayAvg;

                // 应用趋势（逐渐衰减）
                const trendImpact = trend * i * 0.3;
                baseValue += trendImpact;

                // 应用季节系数
                baseValue *= seasonFactor;

                // 应用周末系数
                if (isWeekend) {
                    baseValue *= weekendFactor;
                }

                // 添加周期性波动
                const cyclicVariation = Math.sin((i / 7) * Math.PI * 2) * (histAvg * 0.15);
                baseValue += cyclicVariation;

                // 随机波动（模拟真实情况）
                const randomVariation = (Math.random() - 0.5) * (histAvg * 0.1);
                baseValue += randomVariation;

                // 促销日检测（每月15日和月末假设有小促）
                const dateNum = forecastDate.getDate();
                let isPromo = false;
                if (dateNum === 15 || dateNum >= 28) {
                    baseValue *= (1 + (promoFactor - 1) * 0.5);
                    isPromo = true;
                }

                // 确保非负
                baseValue = Math.max(0, Math.round(baseValue));

                // 计算置信度（越远越低）
                const confidence = Math.max(50, 95 - (i / forecastDays) * 45);

                forecast.push({
                    date: forecastDate,
                    value: baseValue,
                    isWeekend,
                    isPromo,
                    confidence: Math.round(confidence),
                    dayOfWeek: ['日', '一', '二', '三', '四', '五', '六'][dayOfWeek]
                });
            }

            return {
                history: historyData,
                historyDates: generateDateArray(startDate, historyData.length),
                forecast,
                stats: {
                    histAvg: Math.round(histAvg),
                    forecastAvg: Math.round(average(forecast.map(f => f.value))),
                    forecastMax: Math.max(...forecast.map(f => f.value)),
                    forecastMin: Math.min(...forecast.map(f => f.value)),
                    forecastTotal: forecast.reduce((sum, f) => sum + f.value, 0)
                }
            };
        }

        // 计算趋势
        function calculateTrend(data) {
            if (data.length < 2) return 0;

            const n = data.length;
            const sumX = (n * (n - 1)) / 2;
            const sumY = data.reduce((a, b) => a + b, 0);
            const sumXY = data.reduce((sum, y, x) => sum + x * y, 0);
            const sumX2 = (n * (n - 1) * (2 * n - 1)) / 6;

            const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            return slope;
        }

        // 计算平均值
        function average(arr) {
            return arr.reduce((a, b) => a + b, 0) / arr.length;
        }

        // 生成日期数组
        function generateDateArray(startDate, length) {
            const dates = [];
            for (let i = 0; i < length; i++) {
                const date = new Date(startDate);
                date.setDate(date.getDate() + i);
                dates.push(date);
            }
            return dates;
        }

        // 显示结果
        function displayResults(forecast, historyData) {
            // 更新统计卡片
            document.getElementById('histAvg').innerHTML =
                `${forecast.stats.histAvg.toLocaleString()}<span class="stat-unit">件</span>`;
            document.getElementById('forecastAvg').innerHTML =
                `${forecast.stats.forecastAvg.toLocaleString()}<span class="stat-unit">件</span>`;
            document.getElementById('forecastMax').innerHTML =
                `${forecast.stats.forecastMax.toLocaleString()}<span class="stat-unit">件</span>`;
            document.getElementById('forecastTotal').innerHTML =
                `${forecast.stats.forecastTotal.toLocaleString()}<span class="stat-unit">件</span>`;

            document.getElementById('statsCard').classList.remove('hidden');

            // 渲染图表
            renderChart(forecast);
            document.getElementById('chartCard').classList.remove('hidden');

            // 渲染表格
            renderTable(forecast);
            document.getElementById('tableCard').classList.remove('hidden');
        }

        // 渲染图表
        function renderChart(forecast) {
            const ctx = document.getElementById('forecastChart').getContext('2d');

            // 销毁旧图表
            if (forecastChart) {
                forecastChart.destroy();
            }

            // 准备数据
            const allDates = [
                ...forecast.historyDates.map(d => formatDate(d)),
                ...forecast.forecast.map(f => formatDate(f.date))
            ];

            const historyValues = [
                ...forecast.history,
                ...Array(forecast.forecast.length).fill(null)
            ];

            const forecastValues = [
                ...Array(forecast.history.length).fill(null),
                ...forecast.forecast.map(f => f.value)
            ];

            // 创建图表
            forecastChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: allDates,
                    datasets: [
                        {
                            label: '历史数据',
                            data: historyValues,
                            borderColor: 'rgba(0, 212, 255, 1)',
                            backgroundColor: 'rgba(0, 212, 255, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            pointRadius: 3,
                            pointBackgroundColor: 'rgba(0, 212, 255, 1)',
                        },
                        {
                            label: '预测数据',
                            data: forecastValues,
                            borderColor: 'rgba(0, 136, 255, 1)',
                            backgroundColor: 'rgba(0, 136, 255, 0.1)',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            tension: 0.4,
                            pointRadius: 3,
                            pointBackgroundColor: 'rgba(0, 136, 255, 1)',
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                color: '#e8f1ff',
                                font: {
                                    size: 12,
                                    family: "'SF Mono', monospace"
                                }
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(10, 22, 40, 0.9)',
                            titleColor: '#00d4ff',
                            bodyColor: '#e8f1ff',
                            borderColor: 'rgba(0, 212, 255, 0.5)',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(0, 212, 255, 0.1)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8fa7c8',
                                font: {
                                    size: 10
                                },
                                maxRotation: 45,
                                minRotation: 45
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(0, 212, 255, 0.1)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8fa7c8',
                                font: {
                                    size: 10
                                },
                                callback: function(value) {
                                    return value.toLocaleString();
                                }
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        // 渲染表格
        function renderTable(forecast) {
            const tbody = document.getElementById('resultTableBody');
            tbody.innerHTML = '';

            forecast.forecast.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = 'predicted-row';

                const typeClass = item.isPromo ? 'badge-warning' :
                                item.isWeekend ? 'badge-info' : 'badge-success';
                const typeText = item.isPromo ? '促销' :
                               item.isWeekend ? '周末' : '工作日';

                row.innerHTML = `
                    <td>${formatDate(item.date)}</td>
                    <td class="${item.isWeekend ? 'weekend' : ''}">星期${item.dayOfWeek}</td>
                    <td><strong>${item.value.toLocaleString()}</strong> 件</td>
                    <td><span class="badge ${typeClass}">${typeText}</span></td>
                    <td>${item.confidence}%</td>
                `;

                tbody.appendChild(row);
            });
        }

        // 格式化日期
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
    </script>
</body>
